name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions:
  contents: read

# Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub-hosted runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Go: build the workspace modules explicitly so CodeQL traces the whole
      # graph (autobuild doesn't span go.work members). JS/TS uses build-mode
      # "none" — extracted from source, so it never touches the Go toolchain.
      - if: matrix.build-mode == 'manual'
        run: go build ./server/... ./cli/... ./apiclient/...

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
