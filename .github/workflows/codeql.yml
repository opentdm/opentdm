name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions:
  contents: read

# Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub-hosted runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["go", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}

      # The Go workspace ties three modules together; build them explicitly so
      # CodeQL traces the whole graph (autobuild doesn't span go.work members).
      - if: matrix.language == 'go'
        run: go build ./server/... ./cli/... ./apiclient/...

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
