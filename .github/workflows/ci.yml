name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub-hosted runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build

  go:
    name: Go (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opentdm
          POSTGRES_PASSWORD: opentdm
          POSTGRES_DB: opentdm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentdm -d opentdm_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://opentdm:opentdm@localhost:5432/opentdm_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # newest 1.25.x (matches the go.mod toolchain; needed once setup-go v6 pins GOTOOLCHAIN=local)
      - name: gofmt
        run: |
          unformatted=$(gofmt -l server cli apiclient)
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./server/... ./cli/... ./apiclient/...
      - name: go test (race + cover)
        # -p 1 serializes package test binaries: the store and httpapi e2e tests
        # share one Postgres and TRUNCATE it, so they must not run concurrently.
        run: go test -race -cover -p 1 ./server/... ./cli/... ./apiclient/...

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: opentdm/server:ci

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # newest 1.25.x, so govulncheck scans the patched stdlib
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan each module
        env:
          GOWORK: "off" # scan each module against its own go.mod, not the workspace
        run: |
          set -e
          for m in server cli apiclient; do
            echo "== govulncheck ./... in $m =="
            (cd "$m" && govulncheck ./...)
          done
