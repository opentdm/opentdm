name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub-hosted runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build

  go:
    name: Go (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opentdm
          POSTGRES_PASSWORD: opentdm
          POSTGRES_DB: opentdm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentdm -d opentdm_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://opentdm:opentdm@localhost:5432/opentdm_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l server cli apiclient)
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./server/... ./cli/... ./apiclient/...
      - name: go test (race + cover)
        run: go test -race -cover ./server/... ./cli/... ./apiclient/...

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: opentdm/server:ci
