# GoReleaser config for the opentdm CLI. The CLI is its own module (cli/) with a
# replace directive for the local apiclient, so it builds standalone with
# GOWORK=off. Multi-platform binaries are published to GitHub Releases on v* tags.
version: 2

project_name: opentdm

builds:
  - id: opentdm
    dir: cli
    main: ./cmd/opentdm
    binary: opentdm
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: opentdm
    name_template: "opentdm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: opentdm
    name: opentdm
  draft: false
  prerelease: auto
