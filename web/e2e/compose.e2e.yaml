services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opentdm
      POSTGRES_PASSWORD: opentdm
      POSTGRES_DB: opentdm_e2e
    volumes:
      - pg_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentdm -d opentdm_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "18099:8080"
    environment:
      OPENTDM_MASTER_KEY: ${OPENTDM_MASTER_KEY}
      OPENTDM_TOKEN_PEPPER: ${OPENTDM_TOKEN_PEPPER}
      OPENTDM_SESSION_SECRET: ${OPENTDM_SESSION_SECRET}
      DATABASE_URL: postgres://opentdm:opentdm@postgres:5432/opentdm_e2e?sslmode=disable
      OPENTDM_BIND: "0.0.0.0"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_e2e_data:
